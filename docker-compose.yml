services:
  mongodb:
    image: mongo:latest
    container_name: cv_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      MONGO_INITDB_DATABASE: cv_db

  backend:
    build:
      context: ./backend
    container_name: cv_backend
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Si falla el .env, usará esta por defecto apuntando al contenedor local
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/cv_db}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      # Sincroniza tu código local con el contenedor para ver cambios en tiempo real
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: cv_frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_URL: ${API_URL}
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL}
      NODE_ENV: development # Cambiado a desarrollo
    ports:
      - "3000:3000"
    volumes:
      # Opcional, pero recomendado: sincroniza el código del frontend para recarga en caliente
      - ./frontend:/app
      - /app/node_modules # Evita sobreescribir los módulos instalados en el contenedor
    command: npm run dev # Cambiado de preview a dev para desarrollo local

volumes:
  mongodb_data: