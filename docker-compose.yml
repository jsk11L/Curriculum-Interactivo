services:
  mongodb:
    image: mongo:latest
    container_name: cv_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: cv_backend
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: cv_frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_URL: ${API_URL}
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
